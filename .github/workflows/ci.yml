name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # Matches the runtime pinned in nixpacks.toml.
          python-version: "3.12"
      # requirements-dev chains to requirements.lock, so the versions pytest
      # runs against here are exactly what Railway deploys.
      - run: pip install -r backend/requirements-dev.txt
      - run: ruff check .
        working-directory: backend
      - run: ruff format --check .
        working-directory: backend
      # Type-checks the application modules per backend/mypy.ini.
      - run: mypy
        working-directory: backend
      - run: pytest
        working-directory: backend

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The runner's preinstalled Node is plenty for node --test.
      - run: node --test "frontend/*.test.js"

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      # Dev-only deps for the Playwright smoke suite (the app itself is buildless);
      # npm ci installs the exact @playwright/test pinned in package-lock.json.
      - run: npm ci
      # Chromium only, matching the single-browser smoke config; --with-deps pulls
      # the system libraries the headless browser needs on the runner.
      - run: npx playwright install chromium --with-deps
      # Hermetic: page.route intercepts every /api/* and the two unpkg Leaflet URLs,
      # and the config's webServer serves frontend/, so this needs no network or
      # Python backend at test time.
      - run: npx playwright test --config tests/e2e/playwright.config.js

# Minimal type-check config for the backend application modules. CI runs
# `mypy` from this directory (after ruff, before pytest). Deliberately
# pragmatic, not strict: the codebase passes plain dicts internally by
# design, so strict mode (and the annotation churn it would force) is off.
# tests/ are excluded for now; they exercise the same modules at runtime.
[mypy]
files = main.py, feeds.py, static_data.py, bus_static.py, railroad_static.py, path_static.py, models.py

# gtfs-realtime-bindings ships no type stubs for google.transit.
[mypy-google.transit.*]
ignore_missing_imports = True

# protobuf ships untyped; stubs exist (types-protobuf) but pulling them in
# would type-check an API we only touch for DecodeError. Ignore for now.
[mypy-google.protobuf.*]
ignore_missing_imports = True
